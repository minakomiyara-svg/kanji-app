<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Kanji Study App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
 <div id="startScreen" class="overlay" role="dialog" aria-modal="true">
    <div class="overlayCard">
      <h2>漢字クイズ</h2>

      <div class="gradeSection">
        <div class="gradeHeader">
          <span class="gradeLabel">小学校１年生</span>
          <span id="weakInfo-g1" class="weakBadge"></span>
        </div>
        <div class="gradeButtons">
          <button id="startBtn-g1" class="primaryBtn halfBtn">はじめる</button>
          <button id="reviewStartBtn-g1" class="secondaryBtn halfBtn hidden">苦手を復習</button>
        </div>
      </div>

      <div class="gradeSection">
        <div class="gradeHeader">
          <span class="gradeLabel">小学校２年生</span>
          <span id="weakInfo-g2" class="weakBadge"></span>
        </div>
        <div class="gradeButtons">
          <button id="startBtn-g2" class="primaryBtn halfBtn">はじめる</button>
          <button id="reviewStartBtn-g2" class="secondaryBtn halfBtn hidden">苦手を復習</button>
        </div>
      </div>

      <button id="weakListBtn" class="textBtn">苦手な漢字リストを見る 📋</button>
    </div>
  </div>

  <div id="weakListScreen" class="overlay hidden" role="dialog" aria-modal="true">
    <div class="overlayCard weakListCard">
      <h2>苦手な漢字</h2>
      <div id="weakListContent"></div>
      <button id="weakListCloseBtn" class="primaryBtn">とじる</button>
    </div>
  </div>

  <div id="resultsScreen" class="overlay hidden" role="dialog" aria-modal="true">
    <div class="overlayCard">
      <h2 id="resultsTitle"></h2>
      <p id="resultScore" class="resultScoreText"></p>
      <p id="resultMedal" class="medalText"></p>
      <p id="weakCountDisplay" class="weakInfo"></p>
      <button id="reviewBtn" class="secondaryBtn hidden">苦手を復習する</button>
      <button id="retryBtn" class="primaryBtn">もう一回やる</button>
    </div>
  </div>

 <main>
  <h1>漢字クイズ</h1>
  <p id="score">正解 0 / 0</p>
<label for="level" style="display:block; margin: 10px 0 14px; font-weight:700;">
  レベル：
  <select id="level">
    <option value="1年生">小学校１年生</option>
    <option value="2年生" selected>小学校２年生</option>
  </select>
</label>

  <p id="question">「犬」はどれ？</p>

  <div id="choices"></div>

  <p id="message"></p>

</main>

<div id="sparkles" aria-hidden="true"></div>

<audio id="sound-ok" src="ok.ogg"></audio>
<audio id="sound-ng" src="ng.ogg"></audio>

<script src="app.js"></script>
 

</body>
</html>
